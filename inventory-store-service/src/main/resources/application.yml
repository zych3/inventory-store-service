spring:
  application:
    name: inventory-store-service

  datasource:
    url: jdbc:postgresql://localhost:5433/inventory_store_service
    username: inventory_store_service
    password: inventory_store_service

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics

springdoc:
  swagger-ui:
    path: /swagger-ui.html

player-service:
  base-url: http://localhost:8081