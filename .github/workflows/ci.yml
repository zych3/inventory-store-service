name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile all modules
        run: ./gradlew build -x test

  test-player-service:
    name: Test player-service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :player-service:test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: player-service-test-report
          path: player-service/build/reports/tests/

  test-inventory-store:
    name: Test inventory-store-service
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run tests
        run: ./gradlew :inventory-store-service:test

      - name: Upload test report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: inventory-store-test-report
          path: inventory-store-service/build/reports/tests/